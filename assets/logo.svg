<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <filter id="purple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#e0b0ff" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0a0512"/>

  <g filter="url(#purple-glow)">
    <text x="50%" y="75%" 
          font-family="'Cinzel', 'Times New Roman', serif" 
          font-size="64" 
          font-weight="300" 
          fill="url(#purple-grad)" 
          text-anchor="middle" 
          letter-spacing="18">ARISE</text>
    
    <line x1="40" y1="63" x2="360" y2="63" stroke="#8a2be2" stroke-width="1.5" opacity="0.7" />
    <circle cx="200" cy="63" r="2" fill="#ffffff" />
  </g>
</svg>
